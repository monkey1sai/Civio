repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^civio-(cloud|edge)/.*\.py$
      - id: ruff-format
        files: ^civio-(cloud|edge)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^civio-cloud/src/
        args: [--strict, --ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.10
          - sqlalchemy>=2.0
          - types-redis

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ['-ll', '-r']
        files: ^civio-(cloud|edge)/src/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.lock$|^\.env\.example$'

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: dart-format
        name: dart format
        entry: bash -c 'cd civio-app && dart format --set-exit-if-changed lib/ test/'
        language: system
        files: ^civio-app/.*\.dart$
        pass_filenames: false

      - id: dart-analyze
        name: dart analyze
        entry: bash -c 'cd civio-app && dart analyze --fatal-infos lib/ test/'
        language: system
        files: ^civio-app/.*\.dart$
        pass_filenames: false
