name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.24.5"
  POETRY_VERSION: "1.8.4"

jobs:
  # ========================================================================
  # Lint and type checking
  # ========================================================================
  lint-cloud:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: civio-cloud } }
    steps:
      - uses: actions/checkout@v4
      - name: Check if civio-cloud is initialized
        id: check_cloud
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "civio-cloud not yet initialized, skipping lint"
          fi
      - uses: actions/setup-python@v5
        if: steps.check_cloud.outputs.exists == 'true'
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - uses: snok/install-poetry@v1
        if: steps.check_cloud.outputs.exists == 'true'
        with: { version: "${{ env.POETRY_VERSION }}" }
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry install --no-interaction --no-root
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry run ruff check src/ tests/
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry run ruff format --check src/ tests/
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry run mypy src/ --strict
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry run bandit -r src/ -ll

  lint-flutter:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: civio-app } }
    steps:
      - uses: actions/checkout@v4
      - name: Check if civio-app is initialized
        id: check_app
        run: |
          if [ -f pubspec.yaml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "civio-app not yet initialized, skipping lint"
          fi
      - uses: subosito/flutter-action@v2
        if: steps.check_app.outputs.exists == 'true'
        with: { flutter-version: "${{ env.FLUTTER_VERSION }}", channel: stable }
      - if: steps.check_app.outputs.exists == 'true'
        run: flutter pub get
      - if: steps.check_app.outputs.exists == 'true'
        run: dart format --set-exit-if-changed lib/ test/
      - if: steps.check_app.outputs.exists == 'true'
        run: dart analyze --fatal-infos lib/ test/

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: trufflesecurity/trufflehog@main
        with: { extra_args: --only-verified }

  # ========================================================================
  # Unit tests
  # ========================================================================
  test-cloud-unit:
    runs-on: ubuntu-latest
    needs: [lint-cloud]
    defaults: { run: { working-directory: civio-cloud } }
    steps:
      - uses: actions/checkout@v4
      - name: Check if civio-cloud is initialized
        id: check_cloud
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "civio-cloud not yet initialized, skipping unit tests"
          fi
      - uses: actions/setup-python@v5
        if: steps.check_cloud.outputs.exists == 'true'
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - uses: snok/install-poetry@v1
        if: steps.check_cloud.outputs.exists == 'true'
        with: { version: "${{ env.POETRY_VERSION }}" }
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry install --no-interaction --no-root
      - if: steps.check_cloud.outputs.exists == 'true'
        run: |
          poetry run pytest tests/unit -x -q \
            --cov=src --cov-report=xml --cov-fail-under=80
      - if: steps.check_cloud.outputs.exists == 'true'
        uses: codecov/codecov-action@v5
        with: { file: civio-cloud/coverage.xml, flags: cloud-unit }

  test-flutter-unit:
    runs-on: ubuntu-latest
    needs: [lint-flutter]
    defaults: { run: { working-directory: civio-app } }
    steps:
      - uses: actions/checkout@v4
      - name: Check if civio-app is initialized
        id: check_app
        run: |
          if [ -f pubspec.yaml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "civio-app not yet initialized, skipping unit tests"
          fi
      - uses: subosito/flutter-action@v2
        if: steps.check_app.outputs.exists == 'true'
        with: { flutter-version: "${{ env.FLUTTER_VERSION }}", channel: stable }
      - if: steps.check_app.outputs.exists == 'true'
        run: flutter pub get
      - if: steps.check_app.outputs.exists == 'true'
        run: flutter test --coverage
      - if: steps.check_app.outputs.exists == 'true'
        uses: codecov/codecov-action@v5
        with: { file: civio-app/coverage/lcov.info, flags: flutter-unit }

  # ========================================================================
  # Integration tests
  # ========================================================================
  test-cloud-integration:
    runs-on: ubuntu-latest
    needs: [test-cloud-unit]
    defaults: { run: { working-directory: civio-cloud } }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: civio_test
          POSTGRES_USER: civio
          POSTGRES_PASSWORD: test_password
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: civio
          RABBITMQ_DEFAULT_PASS: test_password
        ports: ["5673:5672"]
    env:
      DATABASE_URL: postgresql+asyncpg://civio:test_password@localhost:5433/civio_test
      REDIS_URL: redis://localhost:6380/0
      RABBITMQ_URL: amqp://civio:test_password@localhost:5673/
      JWT_SECRET: test_secret_at_least_32_bytes_long_xxxxxx
      OPENSIPS_AUTH_SHARED_SECRET: test_shared_secret_hex
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Check if civio-cloud is initialized
        id: check_cloud
        run: |
          if [ -f pyproject.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "civio-cloud not yet initialized, skipping integration tests"
          fi
      - uses: actions/setup-python@v5
        if: steps.check_cloud.outputs.exists == 'true'
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - uses: snok/install-poetry@v1
        if: steps.check_cloud.outputs.exists == 'true'
        with: { version: "${{ env.POETRY_VERSION }}" }
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry install --no-interaction --no-root
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry run alembic upgrade head
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry run alembic check
      - if: steps.check_cloud.outputs.exists == 'true'
        run: poetry run pytest tests/integration -x -q

  # ========================================================================
  # Contract tests (Schemathesis)
  # ========================================================================
  contract-tests:
    runs-on: ubuntu-latest
    needs: [test-cloud-integration]
    defaults: { run: { working-directory: civio-cloud } }
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: civio_test
          POSTGRES_USER: civio
          POSTGRES_PASSWORD: test_password
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://civio:test_password@localhost:5433/civio_test
      JWT_SECRET: test_secret_at_least_32_bytes_long_xxxxxx
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Check if civio-cloud FastAPI app is initialized
        id: check_api
        run: |
          if [ -f src/main.py ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "civio-cloud FastAPI app not yet initialized, skipping contract tests"
          fi
      - uses: actions/setup-python@v5
        if: steps.check_api.outputs.exists == 'true'
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - uses: snok/install-poetry@v1
        if: steps.check_api.outputs.exists == 'true'
        with: { version: "${{ env.POETRY_VERSION }}" }
      - if: steps.check_api.outputs.exists == 'true'
        run: poetry install --no-interaction --no-root
      - if: steps.check_api.outputs.exists == 'true'
        run: poetry run alembic upgrade head
      - name: Start API
        if: steps.check_api.outputs.exists == 'true'
        run: poetry run uvicorn src.main:app --port 8000 &
      - if: steps.check_api.outputs.exists == 'true'
        run: sleep 5 && curl -f http://localhost:8000/health || exit 1
      - if: steps.check_api.outputs.exists == 'true'
        run: |
          poetry run schemathesis run ../docs/03-api-contract.yaml \
            --base-url http://localhost:8000 \
            --checks all \
            --hypothesis-max-examples 50

  # ========================================================================
  # Docker builds
  # ========================================================================
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-cloud-unit, test-flutter-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose config -q
      - name: Check if Dockerfiles exist
        id: check_dockerfile
        run: |
          if [ -f civio-cloud/Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile yet, skipping docker compose build"
          fi
      - if: steps.check_dockerfile.outputs.exists == 'true'
        run: docker compose build

  # ========================================================================
  # E2E (SIPp + full stack)
  # ========================================================================
  e2e:
    runs-on: ubuntu-latest
    needs: [build-docker, contract-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Check if e2e stack is defined
        id: check_e2e
        run: |
          if [ -f docker-compose.e2e.yml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "e2e stack not yet defined (Phase 10), skipping"
          fi
      - if: steps.check_e2e.outputs.exists == 'true'
        run: cp .env.example .env
      - if: steps.check_e2e.outputs.exists == 'true'
        run: docker compose -f docker-compose.e2e.yml up -d --wait
      - if: steps.check_e2e.outputs.exists == 'true'
        run: ./scripts/e2e.sh
      - if: ${{ always() && steps.check_e2e.outputs.exists == 'true' }}
        run: docker compose -f docker-compose.e2e.yml logs
      - if: ${{ always() && steps.check_e2e.outputs.exists == 'true' }}
        run: docker compose -f docker-compose.e2e.yml down -v

  # ========================================================================
  # All-green gate (required by branch protection)
  # ========================================================================
  ci-passed:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-cloud
      - lint-flutter
      - secrets-scan
      - test-cloud-unit
      - test-flutter-unit
      - test-cloud-integration
      - contract-tests
      - build-docker
      - e2e
    steps:
      - name: Verify no upstream job failed
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Upstream results: $results"
          if echo "$results" | tr ',' '\n' | grep -qE '^(failure|cancelled)$'; then
            echo "At least one required job failed or was cancelled"
            exit 1
          fi
          echo "All upstream jobs succeeded or were skipped"
